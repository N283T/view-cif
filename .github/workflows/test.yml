name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "config.example.yaml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "config.example.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Lint
        if: matrix.python-version == '3.12'
        run: uv run ruff check .

      - name: Test
        run: uv run pytest --cov=view_cif --cov-report=term-missing -v
